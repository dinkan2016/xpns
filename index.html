<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>Complete Expense Tracker</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Segoe UI", Tahoma, sans-serif; background: #f8f9fa; }
        .app { min-height: 100vh; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
        .title { display: flex; align-items: center; gap: 12px; }
        .icon { font-size: 32px; }
        .title-text h1 { font-size: 24px; margin: 0; }
        .title-text p { font-size: 11px; opacity: 0.9; }
        .header-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .header-info { font-size: 12px; background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 6px; }
        select, input[type="month"] { padding: 8px 12px; border: none; border-radius: 6px; background: rgba(255,255,255,0.2); color: white; font-weight: 600; cursor: pointer; }
        .tabs { display: flex; gap: 0; border-bottom: 2px solid rgba(255,255,255,0.3); overflow-x: auto; }
        .tab { padding: 10px 12px; background: none; border: none; color: white; cursor: pointer; font-weight: 600; font-size: 12px; white-space: nowrap; border-bottom: 3px solid transparent; }
        .tab.active { border-bottom: 3px solid white; background: rgba(255,255,255,0.1); }
        .main { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 12px; margin-right: 6px; margin-bottom: 6px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #4ECDC4; color: white; }
        .btn-success { background: #6BCF7F; color: white; }
        .btn-danger { background: #FF6B6B; color: white; }
        .btn-warning { background: #FFB84D; color: white; }
        .btn:hover { opacity: 0.9; }
        .form-group { margin-bottom: 12px; }
        .label { display: block; font-weight: 600; font-size: 12px; margin-bottom: 6px; }
        .input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; }
        textarea.input { min-height: 60px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .summary-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px; border-radius: 10px; text-align: center; }
        .summary-card.secondary { background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%); }
        .summary-card.tertiary { background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%); }
        .summary-card.quaternary { background: linear-gradient(135deg, #FFD93D 0%, #FFA502 100%); }
        .summary-label { font-size: 10px; opacity: 0.9; margin-bottom: 6px; }
        .summary-amount { font-size: 20px; font-weight: 700; }
        .item { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #667eea; }
        .item-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-weight: 600; font-size: 13px; }
        .item-meta { font-size: 11px; color: #999; margin-bottom: 6px; }
        .empty { text-align: center; padding: 30px 20px; color: #999; }
        .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
        .person-item { background: #f0f7ff; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid #667eea; }
        .person-name { font-weight: 700; }
        .person-stat { font-size: 12px; color: #999; }
        .balance { padding: 6px; border-radius: 4px; margin-top: 6px; font-size: 12px; font-weight: 700; }
        .balance-positive { background: #f8d7da; color: #721c24; }
        .balance-negative { background: #d4edda; color: #155724; }
        .comment-box { background: #f0f7ff; padding: 8px; border-radius: 6px; margin-top: 8px; font-size: 11px; border-left: 3px solid #667eea; }
        .receipt-indicator { font-size: 11px; color: #4ECDC4; margin-top: 4px; }
        .member-badge { display: inline-block; background: #e8f5e9; padding: 4px 8px; border-radius: 12px; font-size: 11px; margin: 2px; }
        .member-badge.removable { cursor: pointer; }
        .member-badge.removable:hover { background: #ffebee; }
        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
            .tab { padding: 8px 10px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-top">
                <div class="title">
                    <div class="icon">💰</div>
                    <div class="title-text">
                        <h1>Expense Manager</h1>
                        <p>Complete Financial Tracking</p>
                    </div>
                </div>
                <div class="header-controls">
                    <div class="header-info">👤 Sandeep</div>
                    <input type="month" id="month-selector" onchange="changeMonth()">
                    <select id="currency" onchange="changeCurrency()">
                        <option value="INR">INR</option>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                    </select>
                </div>
            </div>
            <div class="tabs" id="tabs-container"></div>
        </div>

        <div class="main" id="main-content"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .catch(err => console.log('SW registration failed:', err));
        }

        const OWNER = 'Sandeep';
        const symbols = { INR: '₹', USD: '$', EUR: '€', GBP: '£' };
        const expenseCategories = ['Food', 'Transport', 'Entertainment', 'Shopping', 'Utilities', 'Health', 'Education', 'Other'];

        let state = {
            data: {
                personal: JSON.parse(localStorage.getItem('personal_expenses') || '[]').filter(e => e && e.id),
                trips: JSON.parse(localStorage.getItem('trips_complete') || '[]').filter(t => t && t.id),
                lending: JSON.parse(localStorage.getItem('lending_expenses') || '[]').filter(l => l && l.id)
            },
            currency: localStorage.getItem('currency') || 'INR',
            currentMonth: new Date().toISOString().slice(0, 7),
            activeTab: 'dashboard',
            selectedTripId: null,
            showPersonalForm: false,
            showTripForm: false,
            showLendingForm: false
        };

        function getSymbol() { return symbols[state.currency] || state.currency; }
        function saveData() { 
            localStorage.setItem('personal_expenses', JSON.stringify(state.data.personal));
            localStorage.setItem('trips_complete', JSON.stringify(state.data.trips));
            localStorage.setItem('lending_expenses', JSON.stringify(state.data.lending));
        }
        function changeMonth() { state.currentMonth = document.getElementById('month-selector').value; render(); }
        function changeCurrency() { state.currency = document.getElementById('currency').value; localStorage.setItem('currency', state.currency); render(); }
        function switchTab(tab) { state.activeTab = tab; state.selectedTripId = null; state.showPersonalForm = false; state.showTripForm = false; state.showLendingForm = false; render(); }

        function validateAmount(amt) { const p = parseFloat(amt); return !isNaN(p) && p > 0 ? p : null; }
        function validateText(t) { return t.trim().length > 0 ? t.trim() : null; }
        function safeDiv(n, d) { return d > 0 ? n / d : 0; }
        function roundTwoDecimals(n) { return isNaN(n) ? 0 : Math.round(n * 100) / 100; }

        function renderTabs() {
            const tabs = ['📊 Dashboard', '💳 Personal', '✈️ Trips', '💸 Lending', '👤 My Expenses'];
            const tabKeys = ['dashboard', 'personal', 'trips', 'lending', 'sandeep'];
            document.getElementById('tabs-container').innerHTML = tabs.map((t, i) => 
                `<button class="tab ${state.activeTab === tabKeys[i] ? 'active' : ''}" onclick="switchTab('${tabKeys[i]}')">${t}</button>`
            ).join('');
        }

        function render() {
            renderTabs();
            document.getElementById('month-selector').value = state.currentMonth;
            let content = '';
            if (state.activeTab === 'dashboard') content = renderDashboard();
            else if (state.activeTab === 'personal') content = renderPersonalTab();
            else if (state.activeTab === 'trips') content = renderTripsTab();
            else if (state.activeTab === 'lending') content = renderLendingTab();
            else if (state.activeTab === 'sandeep') content = renderSandeepTab();
            document.getElementById('main-content').innerHTML = content;
        }

        function renderDashboard() {
            const monthExpenses = getMonthExpenses();
            const activeTrips = state.data.trips.filter(t => t.status === 'active').length;
            const activeLending = state.data.lending.filter(l => !l.isSettled).length;
            
            let html = `<h2 class="section-title">📊 Dashboard - ${new Date(state.currentMonth + '-01').toLocaleDateString('en-US', {year: 'numeric', month: 'long'})}</h2>`;
            html += `<div class="summary-grid">
                <div class="summary-card"><div class="summary-label">Total Spent</div><div class="summary-amount">${getSymbol()}${roundTwoDecimals(monthExpenses.total).toFixed(2)}</div></div>
                <div class="summary-card secondary"><div class="summary-label">Personal</div><div class="summary-amount">${getSymbol()}${roundTwoDecimals(monthExpenses.personal).toFixed(2)}</div></div>
                <div class="summary-card tertiary"><div class="summary-label">Trips</div><div class="summary-amount">${getSymbol()}${roundTwoDecimals(monthExpenses.tripShares).toFixed(2)}</div></div>
                <div class="summary-card quaternary"><div class="summary-label">Lending</div><div class="summary-amount">${getSymbol()}${roundTwoDecimals(Math.abs(monthExpenses.lendingBalance)).toFixed(2)}</div></div>
            </div>`;

            html += `<div class="card"><h3 class="section-title">🎯 Quick Stats</h3>
                <div style="display: grid; gap: 10px;">
                    <div><strong>Active Trips:</strong> ${activeTrips}</div>
                    <div><strong>Pending Lending:</strong> ${activeLending}</div>
                    <div><strong>Overall Balance:</strong> ${getSymbol()}${roundTwoDecimals(monthExpenses.balance).toFixed(2)}</div>
                </div>
            </div>`;

            const settlements = getMonthSettlements();
            if (settlements.length > 0) {
                html += `<div class="card"><h3 class="section-title">💸 Pending Settlements (Trips)</h3>`;
                settlements.forEach(s => html += `<div class="person-item"><div class="person-name">${s.from} → ${s.to}</div><div class="person-stat">${getSymbol()}${roundTwoDecimals(s.amount).toFixed(2)}</div></div>`);
                html += `</div>`;
            }

            return html;
        }

        function renderPersonalTab() {
            let html = `<button class="btn btn-primary" onclick="togglePersonalForm()" style="width: 100%; margin-bottom: 12px;">➕ Add Expense</button>`;
            if (state.showPersonalForm) {
                const today = new Date().toISOString().split('T')[0];
                html += `<div class="card">
                    <div class="form-group"><label class="label">Description</label><input type="text" class="input" id="pers-desc" maxlength="50" placeholder="What did you spend on?"></div>
                    <div class="form-row">
                        <div class="form-group"><label class="label">Amount</label><input type="number" class="input" id="pers-amt" min="0" step="0.01" placeholder="0.00"></div>
                        <div class="form-group"><label class="label">Category</label><select class="input" id="pers-cat">${expenseCategories.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="label">Date</label><input type="date" class="input" id="pers-date" value="${today}"></div>
                        <div class="form-group"><label class="label">Receipt</label><input type="file" class="input" id="pers-receipt" accept="image/*"></div>
                    </div>
                    <div class="form-group"><label class="label">Comments</label><textarea class="input" id="pers-comment" placeholder="Add any notes..."></textarea></div>
                    <button class="btn btn-success" onclick="addPersonal()" style="width: 100%;">✓ Add</button>
                </div>`;
            }
            const monthPersonal = state.data.personal.filter(e => e.date && e.date.slice(0, 7) === state.currentMonth);
            html += `<div class="card"><h3 class="section-title">📋 Expenses (${monthPersonal.length})</h3>`;
            html += monthPersonal.length === 0 ? '<div class="empty">No expenses</div>' : monthPersonal.map(e => {
                let itemHtml = `<div class="item"><div class="item-header"><span>${e.description || 'Unnamed'}</span><span>${getSymbol()}${roundTwoDecimals(e.amount).toFixed(2)}</span></div>
                    <div class="item-meta">🏷️ ${e.category || 'Other'} | 📅 ${e.date ? new Date(e.date).toLocaleDateString() : 'No date'}</div>`;
                if (e.receipt) itemHtml += `<div class="receipt-indicator">📷 Receipt attached</div>`;
                if (e.comment) itemHtml += `<div class="comment-box">💬 ${e.comment}</div>`;
                itemHtml += `<div><button class="btn btn-warning btn-small" onclick="sharePersonalExpense(${e.id})">📱 Share</button><button class="btn btn-danger btn-small" onclick="deletePersonal(${e.id})">Delete</button></div></div>`;
                return itemHtml;
            }).join('');
            html += `</div>`;
            return html;
        }

        function renderTripsTab() {
            let html = `<button class="btn btn-secondary" onclick="toggleCreateTripForm()" style="width: 100%; margin-bottom: 12px;">➕ Create Trip</button>`;
            if (state.showTripForm) {
                const today = new Date().toISOString().split('T')[0];
                html += `<div class="card">
                    <div class="form-group"><label class="label">Trip Name</label><input type="text" class="input" id="trip-name" maxlength="50" placeholder="e.g., Bali Trip"></div>
                    <div class="form-row">
                        <div class="form-group"><label class="label">Date</label><input type="date" class="input" id="trip-date" value="${today}"></div>
                        <div class="form-group"><label class="label">Members (besides Sandeep)</label><input type="text" class="input" id="trip-members" maxlength="200" placeholder="Comma separated"></div>
                    </div>
                    <button class="btn btn-success" onclick="createTrip()" style="width: 100%;">✓ Create</button>
                </div>`;
            }
            const active = state.data.trips.filter(t => t.status === 'active');
            html += `<div class="card"><h3 class="section-title">🟢 Active Trips (${active.length})</h3>`;
            html += active.length === 0 ? '<div class="empty">No active trips</div>' : active.map(t => {
                const tripTotal = t.expenses ? t.expenses.reduce((s,e)=>s + (e.amount || 0),0) : 0;
                return `<div class="item"><div class="item-header"><span>${t.name || 'Unnamed'}</span><span>${getSymbol()}${roundTwoDecimals(tripTotal).toFixed(2)}</span></div>
                <div class="item-meta">👥 ${t.members ? t.members.length : 0} | 💰 ${t.expenses ? t.expenses.length : 0} expenses</div>
                <div><button class="btn btn-primary" onclick="selectTrip(${t.id})">View</button>
                <button class="btn btn-warning" onclick="shareTrip(${t.id})">📱 Share</button>
                <button class="btn btn-danger" onclick="deleteTrip(${t.id})">Delete</button></div></div>`
            }).join('');
            html += `</div>`;
            return html;
        }

        function renderLendingTab() {
            let html = `<button class="btn btn-primary" onclick="toggleLendingForm()" style="width: 100%; margin-bottom: 12px;">➕ Add Lending</button>`;
            if (state.showLendingForm) {
                const today = new Date().toISOString().split('T')[0];
                const dueDate = new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0];
                html += `<div class="card">
                    <div class="form-group"><label class="label">Person</label><input type="text" class="input" id="lend-person" maxlength="50" placeholder="Name"></div>
                    <div class="form-row">
                        <div class="form-group"><label class="label">Amount</label><input type="number" class="input" id="lend-amt" min="0" step="0.01" placeholder="0.00"></div>
                        <div class="form-group"><label class="label">Type</label><select class="input" id="lend-type"><option value="lent">I Lent</option><option value="owe">I Owe</option></select></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="label">Given Date</label><input type="date" class="input" id="lend-date" value="${today}"></div>
                        <div class="form-group"><label class="label">Due Date</label><input type="date" class="input" id="lend-due" value="${dueDate}"></div>
                    </div>
                    <button class="btn btn-success" onclick="addLending()" style="width: 100%;">✓ Add</button>
                </div>`;
            }
            const pending = state.data.lending.filter(l => !l.isSettled);
            html += `<div class="card"><h3 class="section-title">💸 Pending (${pending.length})</h3>`;
            html += pending.length === 0 ? '<div class="empty">No pending</div>' : pending.map(l => 
                `<div class="item"><div class="item-header"><span>${l.personName || 'Unknown'}</span><span>${getSymbol()}${roundTwoDecimals(l.amount).toFixed(2)}</span></div>
                <div class="item-meta">${l.type === 'lent' ? '💰 Lent' : '💳 Owed'} | Due: ${l.dueDate ? new Date(l.dueDate).toLocaleDateString() : 'No date'}</div>
                <div><button class="btn btn-success" onclick="settleLending(${l.id})">Settle</button>
                <button class="btn btn-warning" onclick="shareLending(${l.id})">📱 Share</button>
                <button class="btn btn-danger" onclick="deleteLending(${l.id})">Delete</button></div></div>`
            ).join('');
            html += `</div>`;
            return html;
        }

        function renderSandeepTab() {
            let totalPaid = 0, totalOwes = 0;
            state.data.personal.forEach(e => totalPaid += e.amount || 0);
            state.data.trips.forEach(t => {
                const tripTotal = t.expenses ? t.expenses.reduce((s,e)=>s + (e.amount || 0),0) : 0;
                const share = safeDiv(tripTotal, t.members ? t.members.length : 1);
                totalOwes += share;
                const sandeepPaid = t.expenses ? t.expenses.filter(e => e.paidBy === OWNER).reduce((s,e)=>s + (e.amount || 0),0) : 0;
                totalPaid += sandeepPaid;
            });
            let html = `<div class="summary-grid">
                <div class="summary-card"><div class="summary-label">Total Spent</div><div class="summary-amount">${getSymbol()}${roundTwoDecimals(totalPaid).toFixed(2)}</div></div>
                <div class="summary-card secondary"><div class="summary-label">Overall Balance</div><div class="summary-amount">${getSymbol()}${roundTwoDecimals(totalPaid - totalOwes).toFixed(2)}</div></div>
            </div>`;
            return html;
        }

        function getMonthExpenses() {
            let personal = 0, tripShares = 0, lent = 0, owed = 0;
            state.data.personal.filter(e => e.date && e.date.slice(0, 7) === state.currentMonth).forEach(e => personal += e.amount || 0);
            state.data.trips.filter(t => t.date && t.date.slice(0, 7) === state.currentMonth).forEach(t => {
                const total = t.expenses ? t.expenses.reduce((s,e)=>s + (e.amount || 0),0) : 0;
                tripShares += safeDiv(total, t.members ? t.members.length : 1);
            });
            state.data.lending.filter(l => l.givenDate && l.givenDate.slice(0, 7) === state.currentMonth && !l.isSettled).forEach(l => {
                if (l.type === 'lent') lent += l.amount || 0;
                else owed += l.amount || 0;
            });
            const total = personal + tripShares + owed;
            return { personal, tripShares, lendingBalance: owed - lent, total, balance: total - tripShares };
        }

        function getMonthSettlements() {
            const settlements = [];
            state.data.trips.filter(t => t.date && t.date.slice(0, 7) === state.currentMonth).forEach(t => {
                const total = t.expenses ? t.expenses.reduce((s,e)=>s + (e.amount || 0),0) : 0;
                if (t.members && t.members.length === 0) return;
                const perPerson = safeDiv(total, t.members.length);
                const balances = {};
                t.members.forEach(m => balances[m] = 0);
                t.expenses && t.expenses.forEach(e => balances[e.paidBy] = (balances[e.paidBy] || 0) + (e.amount || 0));
                const temp = {};
                Object.keys(balances).forEach(m => temp[m] = balances[m] - perPerson);
                Object.entries(temp).forEach(([p, b]) => {
                    if (b < -0.01) {
                        Object.entries(temp).forEach(([c, cb]) => {
                            if (cb > 0.01 && b < -0.01) {
                                const amt = Math.min(Math.abs(b), cb);
                                settlements.push({from: p, to: c, amount: amt});
                                temp[p] = roundTwoDecimals(temp[p] + amt);
                                temp[c] = roundTwoDecimals(temp[c] - amt);
                            }
                        });
                    }
                });
            });
            return settlements;
        }

        function togglePersonalForm() { state.showPersonalForm = !state.showPersonalForm; render(); }
        function toggleCreateTripForm() { state.showTripForm = !state.showTripForm; render(); }
        function toggleLendingForm() { state.showLendingForm = !state.showLendingForm; render(); }

        function addPersonal() {
            const desc = validateText(document.getElementById('pers-desc').value);
            const amt = validateAmount(document.getElementById('pers-amt').value);
            const cat = document.getElementById('pers-cat').value;
            const date = document.getElementById('pers-date').value;
            const comment = document.getElementById('pers-comment').value.trim();
            const receiptFile = document.getElementById('pers-receipt').files[0];
            
            if (!desc || !amt || !date) { alert('Please fill required fields'); return; }
            
            const reader = new FileReader();
            const processData = (receipt) => {
                state.data.personal.push({id: Date.now(), description: desc, amount: roundTwoDecimals(amt), category: cat, date, comment, receipt});
                saveData();
                state.showPersonalForm = false;
                render();
            };
            
            if (receiptFile) {
                reader.onload = (e) => processData(e.target.result);
                reader.readAsDataURL(receiptFile);
            } else {
                processData(null);
            }
        }

        function deletePersonal(id) {
            if (confirm('Delete expense?')) {
                state.data.personal = state.data.personal.filter(e => e.id !== id);
                saveData();
                render();
            }
        }

        function sharePersonalExpense(id) {
            const exp = state.data.personal.find(e => e.id === id);
            if (!exp) return;
            const msg = `📊 Personal Expense\n${exp.description}\n${getSymbol()}${roundTwoDecimals(exp.amount).toFixed(2)}\n📅 ${new Date(exp.date).toLocaleDateString()}\n🏷️ ${exp.category}${exp.comment ? '\n💬 ' + exp.comment : ''}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function createTrip() {
            const name = validateText(document.getElementById('trip-name').value);
            const date = document.getElementById('trip-date').value;
            const memberText = document.getElementById('trip-members').value;
            const members = [OWNER, ...memberText.split(',').map(m => validateText(m)).filter(m => m && m !== OWNER)];
            if (!name || !date || members.length < 2) { alert('Please enter trip name, date, and at least one other member'); return; }
            state.data.trips.push({id: Date.now(), name, date, members, expenses: [], status: 'active'});
            saveData();
            state.showTripForm = false;
            render();
        }

        function selectTrip(id) {
            state.selectedTripId = id;
            const trip = state.data.trips.find(t => t.id === id);
            if (!trip) return;
            const total = trip.expenses ? trip.expenses.reduce((s,e)=>s + (e.amount || 0),0) : 0;
            const perPerson = safeDiv(total, trip.members ? trip.members.length : 1);
            
            let html = `<button class="btn btn-secondary" onclick="switchTab('trips')">← Back</button><h2 class="section-title">${trip.name || 'Unnamed'}</h2>
            <div class="summary-grid">
                <div class="summary-card"><div class="summary-label">Total</div><div class="summary-amount">${getSymbol()}${roundTwoDecimals(total).toFixed(2)}</div></div>
                <div class="summary-card secondary"><div class="summary-label">Per Person</div><div class="summary-amount">${getSymbol()}${roundTwoDecimals(perPerson).toFixed(2)}</div></div>
                <div class="summary-card tertiary"><div class="summary-label">Expenses</div><div class="summary-amount">${trip.expenses ? trip.expenses.length : 0}</div></div>
            </div>`;
            
            html += `<div class="card"><h3 class="section-title">👥 Members</h3>
                <div>${trip.members.map(m => `<span class="member-badge">${m}${m !== OWNER ? '<span class="member-remove" onclick="removeMember(\\'' + m + '\\')" style="cursor:pointer; margin-left:4px;">✕</span>' : ''}</span>`).join('')}</div>
                <button class="btn btn-warning" onclick="toggleAddMember()" style="margin-top: 8px;">➕ Add Member</button>
                <div id="add-member-form" style="margin-top: 8px; display:none;">
                    <input type="text" class="input" id="new-member" placeholder="New member name" style="width: 60%; margin-right: 8px;">
                    <button class="btn btn-success" onclick="addMemberToTrip()">Add</button>
                </div>
            </div>`;
            
            html += `<button class="btn btn-primary" onclick="toggleTripExpenseForm()" style="width: 100%; margin: 12px 0;">➕ Add Expense</button>
            <div id="trip-exp-form"></div>
            <div class="card"><h3 class="section-title">💰 Expenses</h3>` + 
            ((!trip.expenses || trip.expenses.length === 0) ? '<div class="empty">No expenses</div>' : trip.expenses.map(e => {
                let eHtml = `<div class="item"><div class="item-header"><span>${e.description || 'Unnamed'}</span><span>${getSymbol()}${roundTwoDecimals(e.amount).toFixed(2)}</span></div>
                <div class="item-meta">👤 ${e.paidBy || 'Unknown'} | 📅 ${e.date ? new Date(e.date).toLocaleDateString() : 'No date'}</div>`;
                if (e.receipt) eHtml += `<div class="receipt-indicator">📷 Receipt attached</div>`;
                if (e.comment) eHtml += `<div class="comment-box">💬 ${e.comment}</div>`;
                eHtml += `<div><button class="btn btn-danger btn-small" onclick="deleteTripExpense(${id}, ${e.id})">Delete</button></div></div>`;
                return eHtml;
            }).join('')) + `</div>`;

            const balances = {};
            (trip.members || []).forEach(m => balances[m] = 0);
            (trip.expenses || []).forEach(e => balances[e.paidBy] = (balances[e.paidBy] || 0) + (e.amount || 0));
            
            html += `<div class="card"><h3 class="section-title">💸 Settlement</h3>`;
            (trip.members || []).forEach(m => {
                const paid = balances[m] || 0;
                const owes = perPerson;
                const balance = paid - owes;
                html += `<div class="person-item"><div class="person-name">${m} ${m === OWNER ? '(You)' : ''}</div>
                    <div class="person-stat">Paid: ${getSymbol()}${roundTwoDecimals(paid).toFixed(2)} | Owes: ${getSymbol()}${roundTwoDecimals(owes).toFixed(2)}</div>
                    <div class="balance ${balance > 0 ? 'balance-negative' : 'balance-positive'}">${balance > 0 ? '✓ Receive: ' : '✗ Pay: '}${getSymbol()}${roundTwoDecimals(Math.abs(balance)).toFixed(2)}</div></div>`;
            });
            html += `</div><button class="btn btn-warning" onclick="shareTrip(${id})" style="margin-top: 12px;">📱 Share Summary</button>
            <button class="btn btn-success" onclick="endTrip(${id})">End Trip</button>`;
            
            document.getElementById('main-content').innerHTML = html;
        }

        function toggleAddMember() {
            const form = document.getElementById('add-member-form');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        function addMemberToTrip() {
            const trip = state.data.trips.find(t => t.id === state.selectedTripId);
            const name = validateText(document.getElementById('new-member').value);
            if (!name || trip.members.includes(name)) { alert('Invalid or duplicate member'); return; }
            trip.members.push(name);
            saveData();
            selectTrip(state.selectedTripId);
        }

        function removeMember(name) {
            const trip = state.data.trips.find(t => t.id === state.selectedTripId);
            trip.members = trip.members.filter(m => m !== name);
            saveData();
            selectTrip(state.selectedTripId);
        }

        function toggleTripExpenseForm() {
            const container = document.getElementById('trip-exp-form');
            if (!container) return;
            if (container.innerHTML) { container.innerHTML = ''; } else {
                const trip = state.data.trips.find(t => t.id === state.selectedTripId);
                if (!trip) return;
                const today = new Date().toISOString().split('T')[0];
                container.innerHTML = `<div class="card">
                    <div class="form-group"><label class="label">Description</label><input type="text" class="input" id="texp-desc" maxlength="50" placeholder="What was spent on?"></div>
                    <div class="form-row">
                        <div class="form-group"><label class="label">Amount</label><input type="number" class="input" id="texp-amt" min="0" step="0.01" placeholder="0.00"></div>
                        <div class="form-group"><label class="label">Who Paid</label><select class="input" id="texp-paid">${trip.members.map(m => `<option value="${m}">${m}${m === OWNER ? ' (You)' : ''}</option>`).join('')}</select></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="label">Date</label><input type="date" class="input" id="texp-date" value="${today}"></div>
                        <div class="form-group"><label class="label">Receipt</label><input type="file" class="input" id="texp-receipt" accept="image/*"></div>
                    </div>
                    <div class="form-group"><label class="label">Comments</label><textarea class="input" id="texp-comment" placeholder="Add any notes..."></textarea></div>
                    <button class="btn btn-success" onclick="addTripExpense()" style="width: 100%;">✓ Add</button>
                </div>`;
            }
        }

        function addTripExpense() {
            const desc = validateText(document.getElementById('texp-desc').value);
            const amt = validateAmount(document.getElementById('texp-amt').value);
            const paid = document.getElementById('texp-paid').value;
            const date = document.getElementById('texp-date').value;
            const comment = document.getElementById('texp-comment').value.trim();
            const receiptFile = document.getElementById('texp-receipt').files[0];
            
            if (!desc || !amt || !paid || !date) { alert('Please fill required fields'); return; }
            
            const reader = new FileReader();
            const processData = (receipt) => {
                const trip = state.data.trips.find(t => t.id === state.selectedTripId);
                if (trip) {
                    trip.expenses.push({id: Date.now(), description: desc, amount: roundTwoDecimals(amt), paidBy: paid, date, comment, receipt});
                    saveData();
                    selectTrip(state.selectedTripId);
                }
            };
            
            if (receiptFile) {
                reader.onload = (e) => processData(e.target.result);
                reader.readAsDataURL(receiptFile);
            } else {
                processData(null);
            }
        }

        function deleteTripExpense(tripId, expId) {
            if (confirm('Delete expense?')) {
                const trip = state.data.trips.find(t => t.id === tripId);
                if (trip) {
                    trip.expenses = trip.expenses.filter(e => e.id !== expId);
                    saveData();
                    selectTrip(tripId);
                }
            }
        }

        function deleteTrip(id) {
            if (confirm('Delete this trip? This cannot be undone.')) {
                state.data.trips = state.data.trips.filter(t => t.id !== id);
                saveData();
                switchTab('trips');
            }
        }

        function shareTrip(id) {
            const trip = state.data.trips.find(t => t.id === id);
            const total = trip.expenses ? trip.expenses.reduce((s,e)=>s + (e.amount || 0),0) : 0;
            const perPerson = safeDiv(total, trip.members ? trip.members.length : 1);
            let msg = `🎉 TRIP: ${trip.name}\n💰 Total: ${getSymbol()}${roundTwoDecimals(total).toFixed(2)}\nPer Person: ${getSymbol()}${roundTwoDecimals(perPerson).toFixed(2)}\n\n👥 Members:\n${trip.members.join(', ')}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function endTrip(id) {
            if (confirm('End this trip?')) {
                const trip = state.data.trips.find(t => t.id === id);
                if (trip) { trip.status = 'completed'; saveData(); switchTab('trips'); }
            }
        }

        function addLending() {
            const person = validateText(document.getElementById('lend-person').value);
            const amt = validateAmount(document.getElementById('lend-amt').value);
            const type = document.getElementById('lend-type').value;
            const date = document.getElementById('lend-date').value;
            const due = document.getElementById('lend-due').value;
            
            if (!person || !amt || !date || !due) { alert('Please fill all fields'); return; }
            if (new Date(due) < new Date(date)) { alert('Due date must be after given date'); return; }
            
            state.data.lending.push({id: Date.now(), personName: person, amount: roundTwoDecimals(amt), type, givenDate: date, dueDate: due, isSettled: false});
            saveData();
            state.showLendingForm = false;
            render();
        }

        function settleLending(id) {
            if (confirm('Mark as settled?')) {
                const lending = state.data.lending.find(l => l.id === id);
                if (lending) { lending.isSettled = true; lending.settledDate = new Date().toISOString(); saveData(); render(); }
            }
        }

        function shareLending(id) {
            const lend = state.data.lending.find(l => l.id === id);
            const msg = `💰 ${lend.type === 'lent' ? 'Lent to' : 'Owe'} ${lend.personName}\n${getSymbol()}${roundTwoDecimals(lend.amount).toFixed(2)}\n📅 Due: ${new Date(lend.dueDate).toLocaleDateString()}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function deleteLending(id) {
            if (confirm('Delete record?')) {
                state.data.lending = state.data.lending.filter(l => l.id !== id);
                saveData();
                render();
            }
        }

        document.getElementById('currency').value = state.currency;
        document.getElementById('month-selector').value = state.currentMonth;
        render();
    </script>
</body>
</html>
