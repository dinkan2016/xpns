<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>Trip Expense Tracker</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Segoe UI", Tahoma, sans-serif; background: #f8f9fa; color: #333; }
        .app { min-height: 100vh; background: #f8f9fa; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .title { display: flex; align-items: center; gap: 12px; }
        .icon { font-size: 32px; }
        .title-text h1 { font-size: 24px; margin: 0; }
        .title-text p { font-size: 11px; opacity: 0.9; margin: 0; }
        select { padding: 8px 12px; border: none; border-radius: 6px; background: rgba(255,255,255,0.2); color: white; font-weight: 600; cursor: pointer; }
        .tabs { display: flex; gap: 0; border-bottom: 2px solid rgba(255,255,255,0.3); flex-wrap: wrap; }
        .tab { padding: 10px 15px; background: none; border: none; color: white; cursor: pointer; font-weight: 600; font-size: 13px; border-bottom: 3px solid transparent; }
        .tab.active { border-bottom: 3px solid white; background: rgba(255,255,255,0.1); }
        .main { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .content { display: none; }
        .content.show { display: block; }
        .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
        .btn { padding: 8px 14px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-secondary { background: #4ECDC4; color: white; }
        .btn-success { background: #6BCF7F; color: white; }
        .btn-danger { background: #FF6B6B; color: white; }
        .btn-small { padding: 6px 10px; font-size: 12px; }
        .form-group { margin-bottom: 12px; }
        .label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 6px; }
        .input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .summary-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px; border-radius: 10px; text-align: center; }
        .summary-card.secondary { background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%); }
        .summary-card.tertiary { background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%); }
        .summary-label { font-size: 11px; opacity: 0.9; margin-bottom: 6px; }
        .summary-amount { font-size: 22px; font-weight: 700; }
        .expense-item { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #667eea; }
        .expense-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .expense-desc { font-weight: 600; font-size: 13px; }
        .expense-amount { font-weight: 700; color: #667eea; }
        .expense-meta { font-size: 11px; color: #999; margin-bottom: 6px; }
        .settlement { background: #f0f7ff; padding: 10px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; font-size: 12px; }
        .settlement-amount { font-weight: 700; color: #4ECDC4; }
        .member-chip { background: white; padding: 6px 12px; border-radius: 20px; border: 1px solid #ddd; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; margin-right: 6px; margin-bottom: 6px; }
        .member-remove { cursor: pointer; color: #FF6B6B; font-weight: 700; }
        .empty { text-align: center; padding: 30px 20px; color: #999; }
        .trip-item { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .trip-name { font-weight: 700; margin-bottom: 6px; }
        .trip-meta { font-size: 11px; color: #999; margin-bottom: 8px; }
        .whatsapp-btn { background: #25D366; color: white; padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 12px; }
        .whatsapp-btn:hover { background: #20ba5a; }
        .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
        .person-settlement { background: #f0f7ff; padding: 10px; border-radius: 6px; margin-bottom: 8px; }
        .person-name { font-weight: 700; margin-bottom: 4px; }
        .person-stat { font-size: 12px; color: #999; margin-bottom: 4px; }
        .balance { padding: 6px; border-radius: 4px; margin-top: 6px; font-size: 12px; font-weight: 700; }
        .balance-positive { background: #d4edda; color: #155724; }
        .balance-negative { background: #f8d7da; color: #721c24; }
        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-top">
                <div class="title">
                    <div class="icon">✈️</div>
                    <div class="title-text">
                        <h1>Trip Tracker</h1>
                        <p>Dynamic Expense Management</p>
                    </div>
                </div>
                <select id="currency" onchange="changeCurrency()">
                    <option value="INR">INR</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="GBP">GBP</option>
                </select>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('active')">🟢 Active</button>
                <button class="tab" onclick="switchTab('detail')">📊 Details</button>
                <button class="tab" onclick="switchTab('completed')">✅ Completed</button>
            </div>
        </div>

        <div class="main">
            <!-- Active Trips Tab -->
            <div id="active-tab" class="content show">
                <button class="btn btn-secondary" onclick="toggleCreateTrip()" style="width: 100%; margin-bottom: 16px;">
                    <span id="create-btn-text">➕ Create New Trip</span>
                </button>

                <div id="create-form" style="display: none;">
                    <div class="card">
                        <div class="form-group">
                            <label class="label">Trip Name</label>
                            <input type="text" class="input" id="trip-name" placeholder="e.g., Bali Trip">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="label">Date</label>
                                <input type="date" class="input" id="trip-date">
                            </div>
                            <div class="form-group">
                                <label class="label">Description</label>
                                <input type="text" class="input" id="trip-desc" placeholder="Optional">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="label">👥 Add Members</label>
                            <div style="display: flex; gap: 6px;">
                                <input type="text" class="input" id="member-input" placeholder="Member name" style="flex: 1;">
                                <button class="btn btn-primary btn-small" onclick="addMember()">Add</button>
                            </div>
                            <div id="members-list" style="margin-top: 8px;"></div>
                        </div>
                        <button class="btn btn-success" onclick="createTrip()" style="width: 100%;">✓ Create Trip</button>
                    </div>
                </div>

                <div id="trips-list"></div>
            </div>

            <!-- Trip Detail Tab -->
            <div id="detail-tab" class="content">
                <div id="trip-detail-content"></div>
            </div>

            <!-- Completed Tab -->
            <div id="completed-tab" class="content">
                <div id="completed-list"></div>
            </div>
        </div>
    </div>

    <script>
        let trips = JSON.parse(localStorage.getItem('trips_v2')) || [];
        let tempMembers = [];
        let selectedTripId = null;
        let currency = localStorage.getItem('currency') || 'INR';

        const symbols = { INR: '₹', USD: '$', EUR: '€', GBP: '£' };
        const categories = ['Food', 'Accommodation', 'Transport', 'Activities', 'Shopping', 'Other'];

        function getSymbol() { return symbols[currency] || currency; }

        function saveTripData() { localStorage.setItem('trips_v2', JSON.stringify(trips)); }

        function changeCurrency() {
            currency = document.getElementById('currency').value;
            localStorage.setItem('currency', currency);
            document.getElementById('currency').value = currency;
            renderAll();
        }

        function switchTab(tab) {
            document.querySelectorAll('.content').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            
            if (tab === 'active') {
                document.getElementById('active-tab').classList.add('show');
                document.querySelectorAll('.tab')[0].classList.add('active');
                renderActiveTrips();
            } else if (tab === 'detail') {
                document.getElementById('detail-tab').classList.add('show');
                document.querySelectorAll('.tab')[1].classList.add('active');
                renderTripDetail();
            } else {
                document.getElementById('completed-tab').classList.add('show');
                document.querySelectorAll('.tab')[2].classList.add('active');
                renderCompletedTrips();
            }
        }

        function toggleCreateTrip() {
            const form = document.getElementById('create-form');
            const btn = document.getElementById('create-btn-text');
            
            if (form.style.display === 'none') {
                form.style.display = 'block';
                btn.textContent = '❌ Cancel';
                initTripDate();
            } else {
                form.style.display = 'none';
                btn.textContent = '➕ Create New Trip';
                tempMembers = [];
            }
        }

        function initTripDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('trip-date').value = today;
        }

        function addMember() {
            const input = document.getElementById('member-input');
            const name = input.value.trim();
            if (name && !tempMembers.includes(name)) {
                tempMembers.push(name);
                input.value = '';
                renderMembers();
            }
        }

        function removeMember(index) {
            tempMembers.splice(index, 1);
            renderMembers();
        }

        function renderMembers() {
            const list = document.getElementById('members-list');
            list.innerHTML = tempMembers.map((m, i) => 
                `<div class="member-chip">${m}<span class="member-remove" onclick="removeMember(${i})">✕</span></div>`
            ).join('');
        }

        function createTrip() {
            const name = document.getElementById('trip-name').value.trim();
            const date = document.getElementById('trip-date').value;
            const desc = document.getElementById('trip-desc').value.trim();

            if (!name || tempMembers.length === 0) {
                alert('Please enter trip name and add members');
                return;
            }

            const newTrip = {
                id: Date.now(),
                name, date, desc,
                members: [...tempMembers],
                expenses: [],
                status: 'active',
                createdAt: new Date().toISOString()
            };

            trips.push(newTrip);
            saveTripData();
            
            document.getElementById('trip-name').value = '';
            document.getElementById('trip-desc').value = '';
            tempMembers = [];
            document.getElementById('members-list').innerHTML = '';
            document.getElementById('create-form').style.display = 'none';
            document.getElementById('create-btn-text').textContent = '➕ Create New Trip';
            
            renderActiveTrips();
        }

        function renderActiveTrips() {
            const active = trips.filter(t => t.status === 'active');
            const html = active.length === 0 
                ? '<div class="empty">No active trips. Create one!</div>'
                : active.map(t => `
                    <div class="card">
                        <div style="display: flex; justify-content: space-between;">
                            <div>
                                <div class="trip-name">${t.name}</div>
                                <div class="trip-meta">📅 ${new Date(t.date).toLocaleDateString()} | 👥 ${t.members.length} | 💰 ${t.expenses.length} expenses</div>
                            </div>
                            <div>
                                <button class="btn btn-primary btn-small" onclick="selectTrip(${t.id})">View</button>
                                <button class="btn btn-danger btn-small" onclick="endTrip(${t.id})">End</button>
                            </div>
                        </div>
                    </div>
                `).join('');

            document.getElementById('trips-list').innerHTML = html;
        }

        function selectTrip(id) {
            selectedTripId = id;
            switchTab('detail');
        }

        function renderTripDetail() {
            const trip = trips.find(t => t.id === selectedTripId);
            if (!trip) return;

            const total = trip.expenses.reduce((sum, e) => sum + e.amount, 0);
            const perPerson = trip.members.length > 0 ? total / trip.members.length : 0;

            let html = `
                <h2 class="section-title">${trip.name}</h2>
                <div class="summary-grid">
                    <div class="summary-card"><div class="summary-label">Total</div><div class="summary-amount">${getSymbol()}${total.toFixed(2)}</div></div>
                    <div class="summary-card secondary"><div class="summary-label">Expenses</div><div class="summary-amount">${trip.expenses.length}</div></div>
                    <div class="summary-card tertiary"><div class="summary-label">Per Person</div><div class="summary-amount">${getSymbol()}${perPerson.toFixed(2)}</div></div>
                </div>

                <button class="btn btn-secondary" onclick="toggleAddExpense()" style="width: 100%; margin-bottom: 12px;">
                    <span id="exp-btn">${selectedTripId ? '➕ Add Expense' : ''}</span>
                </button>

                <div id="expense-form-container"></div>

                <div class="card">
                    <h3 class="section-title">📋 Expenses</h3>
                    <div id="expenses-list">${trip.expenses.length === 0 ? '<div class="empty">No expenses yet</div>' : trip.expenses.map(e => `
                        <div class="expense-item">
                            <div class="expense-header">
                                <div class="expense-desc">${e.description}</div>
                                <div class="expense-amount">${getSymbol()}${e.amount.toFixed(2)}</div>
                            </div>
                            <div class="expense-meta">👤 ${e.paidBy} | 🏷️ ${e.category} | 📅 ${new Date(e.date).toLocaleDateString()}</div>
                            ${e.notes ? `<div style="font-size: 11px; color: #667eea; margin: 4px 0;">📝 ${e.notes}</div>` : ''}
                            ${e.image ? `<div style="font-size: 11px; color: #4ECDC4;">📷 Receipt attached</div>` : ''}
                            <button class="btn btn-danger btn-small" onclick="deleteExpense(${trip.id}, ${e.id})">Delete</button>
                        </div>
                    `).join('')}</div>
                </div>
            `;

            html += `
                <div class="card">
                    <h3 class="section-title">💸 Settlement</h3>
                    <div id="settlement-content"></div>
                    <button class="whatsapp-btn" onclick="shareViaWhatsApp(${trip.id})">📱 Share Summary</button>
                    <button class="btn btn-success" onclick="endTrip(${trip.id})" style="margin-top: 8px;">End Trip</button>
                </div>
            `;

            document.getElementById('trip-detail-content').innerHTML = html;
            renderSettlement(trip);
            renderExpenseForm();
        }

        function toggleAddExpense() {
            const container = document.getElementById('expense-form-container');
            if (container.style.display !== 'none' && container.innerHTML !== '') {
                container.style.display = 'none';
                container.innerHTML = '';
            } else {
                renderExpenseForm();
                container.style.display = 'block';
            }
        }

        function renderExpenseForm() {
            const trip = trips.find(t => t.id === selectedTripId);
            if (!trip) return;

            const today = new Date().toISOString().split('T')[0];
            const form = `
                <div class="card">
                    <div class="form-group">
                        <label class="label">What was spent on?</label>
                        <input type="text" class="input" id="exp-desc" placeholder="e.g., Hotel, Dinner">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="label">Amount</label>
                            <input type="number" class="input" id="exp-amount" placeholder="0.00" step="0.01">
                        </div>
                        <div class="form-group">
                            <label class="label">Who Paid?</label>
                            <select class="input" id="exp-paidby">
                                <option value="">Select person</option>
                                ${trip.members.map(m => `<option value="${m}">${m}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="label">Category</label>
                            <select class="input" id="exp-category">
                                ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="label">Date</label>
                            <input type="date" class="input" id="exp-date" value="${today}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="label">📝 Notes</label>
                        <input type="text" class="input" id="exp-notes" placeholder="e.g., Premium room, fancy restaurant">
                    </div>
                    <div class="form-group">
                        <label class="label">📷 Receipt/Image (Optional)</label>
                        <input type="file" class="input" id="exp-image" accept="image/*">
                    </div>
                    <button class="btn btn-success" onclick="addExpense()" style="width: 100%;">✓ Add Expense</button>
                </div>
            `;

            document.getElementById('expense-form-container').innerHTML = form;
        }

        function addExpense() {
            const trip = trips.find(t => t.id === selectedTripId);
            const desc = document.getElementById('exp-desc').value.trim();
            const amount = parseFloat(document.getElementById('exp-amount').value);
            const paidBy = document.getElementById('exp-paidby').value;
            const category = document.getElementById('exp-category').value;
            const date = document.getElementById('exp-date').value;
            const notes = document.getElementById('exp-notes').value.trim();
            const imageInput = document.getElementById('exp-image');
            const image = imageInput.files.length > 0 ? imageInput.files[0].name : null;

            if (!desc || !amount || !paidBy) {
                alert('Please fill all required fields');
                return;
            }

            const exp = { id: Date.now(), description: desc, amount, paidBy, category, date, notes, image };
            trip.expenses.push(exp);
            saveTripData();

            document.getElementById('expense-form-container').innerHTML = '';
            document.getElementById('expense-form-container').style.display = 'none';
            renderTripDetail();
        }

        function deleteExpense(tripId, expId) {
            const trip = trips.find(t => t.id === tripId);
            trip.expenses = trip.expenses.filter(e => e.id !== expId);
            saveTripData();
            renderTripDetail();
        }

        function renderSettlement(trip) {
            const total = trip.expenses.reduce((sum, e) => sum + e.amount, 0);
            const perPerson = trip.members.length > 0 ? total / trip.members.length : 0;

            const balances = {};
            trip.members.forEach(m => balances[m] = 0);

            trip.expenses.forEach(e => {
                balances[e.paidBy] += e.amount;
                trip.members.forEach(m => {
                    if (m !== e.paidBy) balances[m] -= perPerson;
                });
                balances[e.paidBy] -= perPerson;
            });

            const settlement = [];
            const temp = { ...balances };

            Object.entries(temp).forEach(([person, balance]) => {
                if (balance < -0.01) {
                    Object.entries(temp).forEach(([creditor, creditorBalance]) => {
                        if (creditorBalance > 0.01 && balance < -0.01) {
                            const amount = Math.min(Math.abs(balance), creditorBalance);
                            settlement.push({ from: person, to: creditor, amount });
                            temp[person] += amount;
                            temp[creditor] -= amount;
                        }
                    });
                }
            });

            let html = `
                <div style="margin-bottom: 12px;">
                    <div style="margin-bottom: 8px;"><strong>Total:</strong> ${getSymbol()}${total.toFixed(2)} | <strong>Per Person:</strong> ${getSymbol()}${perPerson.toFixed(2)}</div>
                </div>
            `;

            html += '<h4 style="margin-bottom: 8px; font-size: 13px;">Member Balances:</h4>';
            trip.members.forEach(m => {
                const paidAmount = trip.expenses.filter(e => e.paidBy === m).reduce((sum, e) => sum + e.amount, 0);
                const balance = balances[m];
                html += `
                    <div class="person-settlement">
                        <div class="person-name">${m}</div>
                        <div class="person-stat">💰 Paid: ${getSymbol()}${paidAmount.toFixed(2)}</div>
                        <div class="person-stat">💳 Owes: ${getSymbol()}${perPerson.toFixed(2)}</div>
                        <div class="balance ${balance > 0 ? 'balance-positive' : 'balance-negative'}">
                            ${balance > 0 ? '✓ Receives: ' + getSymbol() + Math.abs(balance).toFixed(2) : '✗ Pays: ' + getSymbol() + Math.abs(balance).toFixed(2)}
                        </div>
                    </div>
                `;
            });

            if (settlement.length > 0) {
                html += '<h4 style="margin-top: 12px; margin-bottom: 8px; font-size: 13px;">Transfers Needed:</h4>';
                settlement.forEach(s => {
                    html += `<div class="settlement">${s.from} → ${s.to}<span class="settlement-amount">${getSymbol()}${s.amount.toFixed(2)}</span></div>`;
                });
            }

            document.getElementById('settlement-content').innerHTML = html;
        }

        function shareViaWhatsApp(tripId) {
            const trip = trips.find(t => t.id === tripId);
            const total = trip.expenses.reduce((sum, e) => sum + e.amount, 0);
            const perPerson = trip.members.length > 0 ? total / trip.members.length : 0;

            let message = `🎉 TRIP SUMMARY: ${trip.name}\n`;
            message += `━━━━━━━━━━━━━━━━━━━━━\n\n`;
            message += `💰 TOTAL: ${getSymbol()}${total.toFixed(2)}\n`;
            message += `Per Person: ${getSymbol()}${perPerson.toFixed(2)}\n\n`;

            message += `💵 WHO PAID:\n`;
            const paidBy = {};
            trip.expenses.forEach(e => paidBy[e.paidBy] = (paidBy[e.paidBy] || 0) + e.amount);
            Object.entries(paidBy).forEach(([person, amount]) => {
                message += `  ${person}: ${getSymbol()}${amount.toFixed(2)}\n`;
            });

            message += `\n✅ Everyone settled fairly!`;

            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        function endTrip(id) {
            const trip = trips.find(t => t.id === id);
            trip.status = 'completed';
            saveTripData();
            selectedTripId = null;
            renderAll();
        }

        function renderCompletedTrips() {
            const completed = trips.filter(t => t.status === 'completed');
            const html = completed.length === 0
                ? '<div class="empty">No completed trips</div>'
                : completed.map(t => {
                    const total = t.expenses.reduce((sum, e) => sum + e.amount, 0);
                    return `
                        <div class="card">
                            <div style="display: flex; justify-content: space-between;">
                                <div>
                                    <div class="trip-name">${t.name}</div>
                                    <div class="trip-meta">✅ Completed | Total: ${getSymbol()}${total.toFixed(2)}</div>
                                </div>
                                <button class="btn btn-primary btn-small" onclick="selectTrip(${t.id})">View</button>
                            </div>
                        </div>
                    `;
                }).join('');

            document.getElementById('completed-list').innerHTML = html;
        }

        function renderAll() {
            renderActiveTrips();
            renderCompletedTrips();
            if (selectedTripId && trips.find(t => t.id === selectedTripId)) {
                renderTripDetail();
            }
        }

        // Initialize
        document.getElementById('currency').value = currency;
        renderAll();
    </script>
</body>
</html>
